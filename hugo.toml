baseURL = "/"
locale = "en-us"
title = "4-dimensional Artin–Schelter regular algebras"
disableKinds = ["taxonomy", "term", "RSS"]
ignoreFiles = ['/data/references\.bib$', '/data/README\.md$', '/data/.*\.(blg|bcf|bbl)$']

[markup.goldmark.renderer]
unsafe = true

[markup.highlight]
style = "github"
noClasses = true

[markup.goldmark.extensions.passthrough]
enable = true
[markup.goldmark.extensions.passthrough.delimiters]
block = [['\[', '\]'], ['$$', '$$']]
inline = [['\(', '\)']]
