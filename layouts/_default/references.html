{{ define "main" }}
<h1>{{ .Title }}</h1>
{{ .Content }}
<div class="bibliography">
  {{ range sort hugo.Data.refs "author" "asc" }}
  <div class="reference" id="ref-{{ .key }}">
    {{ .html | safeHTML }}
    {{ if hasPrefix .key "MR" }}
    <a href="https://mathscinet.ams.org/mathscinet-getitem?mr={{ strings.TrimPrefix "MR" .key }}">{{ .key }}</a>
    {{ else }}
    <a href="https://arxiv.org/abs/{{ .key }}">arXiv:{{ .key }}</a>
    {{ end }}
    {{ with .DOI }}<a href="https://doi.org/{{ . }}">doi</a>{{ end }}
  </div>
  {{ end }}
</div>
{{ end }}
