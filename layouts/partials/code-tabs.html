{{- /* Bootstrap tabs with the presentation in Macaulay2 / GAP / Magma.
       Context: the family key. */ -}}
{{- $key := . -}}
{{- with index hugo.Data.snippets $key -}}
<ul class="nav nav-tabs" role="tablist">
  <li class="nav-item" role="presentation">
    <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#m2-{{ $key }}" type="button" role="tab">Macaulay2</button>
  </li>
  <li class="nav-item" role="presentation">
    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#gap-{{ $key }}" type="button" role="tab">GAP</button>
  </li>
  <li class="nav-item" role="presentation">
    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#magma-{{ $key }}" type="button" role="tab">Magma</button>
  </li>
</ul>
<div class="tab-content">
  <div class="tab-pane fade show active" id="m2-{{ $key }}" role="tabpanel"><pre><code>{{ .m2 }}</code></pre></div>
  <div class="tab-pane fade" id="gap-{{ $key }}" role="tabpanel"><pre><code>{{ .gap }}</code></pre></div>
  <div class="tab-pane fade" id="magma-{{ $key }}" role="tabpanel"><pre><code>{{ .magma }}</code></pre></div>
</div>
{{- end -}}
