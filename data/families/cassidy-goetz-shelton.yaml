introduced:
  reference: "MR2253666"
  note: >
    A generalized Laurent polynomial ring of Cassidy–Goetz–Shelton; in Pym's
    classification of quadratic Poisson structures it is the type \(L(1,1,2)\).
construction: >
  The Cassidy–Goetz–Shelton algebra: \(x_1, x_2\) commute, the pairs involving
  \(x_3, x_4\) \(q\)-commute, and the \(x_3 x_4\) relation carries a quadratic
  correction in \(x_1, x_2\). The \(σ\) is a diagonal twist (the parameters
  \(α, β\)), under which the family is closed; the \(σ\)-twisted form is the one
  appearing in the dimension-four classification.
relations:
  - "α (x_2 x_1 - x_1 x_2)"
  - "β x_3 x_1 - (1/p_0) α x_1 x_3"
  - "(α^2/β) x_4 x_1 - p_0 α x_1 x_4"
  - "β x_3 x_2 - p_1 α x_2 x_3"
  - "(α^2/β) x_4 x_2 - (1/p_1) α x_2 x_4"
  - "(α^2/β) x_4 x_3 - p_1 (1/p_0) β x_3 x_4 - α (p_1 - p_0)(x_1^2 + λ x_1 x_2 + x_2^2) - α (1 - p_0^2) x_1^2 - α (p_1^2 - 1) x_2^2"
references:
