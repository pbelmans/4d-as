parameters:
  - symbol: "β, γ"
    description: >
      As for the Sklyanin algebra, with \(α = -(β + γ)/(1 + βγ)\).
introduced:
  reference: "MR3490085"
  note: >
    The cocycle twist of the 4-dimensional Sklyanin algebra by the Klein
    four-group \(G = (\mathbb{Z}/2)^2\), studied by Davies.
construction: >
  A 2-cocycle (comodule) twist preserves Hilbert series and AS-regularity but
  changes the geometry: the elliptic point scheme of the Sklyanin algebra is
  replaced by exactly 20 point modules together with infinitely many fat-point
  modules of multiplicity \(2\) (Davies). It is an "exotic elliptic algebra" in
  the sense of Chirvasitu–Smith. The pencil of central quadrics is preserved.
relations:
  - "(x_1 x_2 - x_2 x_1) - α (x_3 x_4 - x_4 x_3)"
  - "(x_1 x_2 + x_2 x_1) - (x_3 x_4 + x_4 x_3)"
  - "(x_1 x_3 - x_3 x_1) - β (x_4 x_2 - x_2 x_4)"
  - "(x_1 x_3 + x_3 x_1) - (x_4 x_2 + x_2 x_4)"
  - "(x_1 x_4 - x_4 x_1) + γ (x_2 x_3 - x_3 x_2)"
  - "(x_1 x_4 + x_4 x_1) + (x_2 x_3 + x_3 x_2)"
references:
  - "MR3490085"
  - "MR3885145"
  - "2511.08390"
point_scheme: '20 points'
centre: 'still \(k[Ω_1, Ω_2]\) (GK-dimension \(2\)); not a cocycle-twist invariant'
code_derive:
  - "alpha = -(beta + gamma)/(1 + beta*gamma)"
