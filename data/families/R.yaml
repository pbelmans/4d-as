name: "R"
kind: "iterated-Ore"
generators: ["x_1", "x_2", "x_3", "x_4"]
quadratic: true
num_parameters: 1
hh0: [2, 1, 0]
point_scheme_dim: 2
parameters:
  - symbol: "h"
    description: "deformation parameter (generic scalar)"
introduced:
  reference: "2511.08390"
  note: "Family R in the classification of Koszul AS-regular algebras of dimension 4 by Bhatoy, Ingalls, LaRoche, Nookala."
construction: >
  An iterated Ore extension giving a quadratic Koszul AS-regular algebra of
  global dimension 4 (a noncommutative projective 3-space). Family R is one of
  the components A–Z of the classification.
relations:
  - "x_2 x_1 + x_1 x_2"
  - "x_4 x_3 + x_3 x_4"
  - "x_3 x_1 + h (- x_1 x_3 - x_2 x_3 - x_1 x_4)"
  - "x_3 x_2 + h (- x_1 x_4)"
  - "x_4 x_1 + h (- x_2 x_3)"
  - "x_4 x_2 + h (x_2 x_3 + x_1 x_4 - x_2 x_4)"
notes: ""
