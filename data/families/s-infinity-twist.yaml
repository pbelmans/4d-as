name: '\(S_\infty\) twist'
kind: "named"
generators: ["x_1", "x_2", "x_3", "x_4"]
quadratic: true
num_parameters: 2
hh0: [1, 8, 17]
hh_qgr: [1, 0, 14, 19]
point_scheme_dim: 0
year: 2016
slug: "s-infinity-twist"
sortkey: "2016 s-infinity-twist"
ks_rank: 2
ks_inj: true
ks_surj: false
centre_z2: 1
centre_z3: 0
normal_1: -1
normal_2: 0
parameters:
  - symbol: "β, γ"
    description: >
      With \(α = -(β + γ)/(1 + βγ)\); \(α, β, γ\) nonzero and not \(\pm 1\).
introduced:
  reference: "MR3490085"
  note: >
    The cocycle twist of \(S_\infty\) by the Klein four-group, in the same family
    of exotic elliptic algebras studied by Davies and by Chirvasitu–Smith.
construction: >
  As for \(S_\infty\), but the surviving Sklyanin relations are twisted
  (commutators exchanged with anticommutators) and the signs in the two quadrics
  change. The twist trades the elliptic point scheme for 20 points and produces
  a single central quadric whose symbol is the smooth hyperbolic form
  \(\mathbb{P}^1 \times \mathbb{P}^1\).
relations:
  - "(x_1 x_2 - x_2 x_1) - α (x_3 x_4 - x_4 x_3)"
  - "(x_1 x_2 + x_2 x_1) - (x_3 x_4 + x_4 x_3)"
  - "(x_1 x_3 - x_3 x_1) - β (x_4 x_2 - x_2 x_4)"
  - "(x_1 x_3 + x_3 x_1) - (x_4 x_2 + x_2 x_4)"
  - "-x_1^2 + x_2^2 + x_3^2 - x_4^2"
  - "x_2^2 + ((1+α)/(1-β)) x_3^2 - ((1-α)/(1+γ)) x_4^2"
references:
  - "MR3490085"
  - "MR3885145"
point_scheme: '20 points'
centre: '\(\dim \operatorname{Z}(A)_2 = 1\); the central quadric is a smooth \(\mathbb{P}^1 \times \mathbb{P}^1\)'
code_derive:
  - "alpha = -(beta + gamma)/(1 + beta*gamma)"
