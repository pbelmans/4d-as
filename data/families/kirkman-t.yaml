introduced:
  reference: "2410.08959"
  note: >
    The algebra "T" of Goetz–Kirkman–Moore–Vashaw, one of a trio of rigid
    (parameter-free) regular algebras arising from dual reflection groups. It is
    listed in Table 8 of arXiv:2511.08390 with relations taken from
    [arXiv:2410.08959, page 10]. It differs from Kirkman S only in two signs but
    shares its graded Hochschild cohomology.
construction: >
  A quadratic algebra with no scalar parameters coming from a dual reflection
  group, a sign variant of Kirkman S. The Kodaira–Spencer map vanishes, so the
  family is a rigid point of the moduli space.
relations:
  - "x_1 x_2 - x_3 x_3"
  - "x_1 x_3 - x_2 x_4"
  - "x_1 x_4 + x_4 x_2"
  - "x_2 x_3 - x_3 x_1"
  - "x_3 x_2 - x_4 x_1"
  - "x_2 x_1 + x_4 x_4"
