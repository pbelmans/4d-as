introduced:
  reference: "MR3366864"
  note: >
    One of Pym's quantum deformations of projective 3-space, arising from a
    quadratic Poisson structure (the type \(S(2,3)\)).
construction: >
  A quantization of a Poisson structure on \(\mathbb{P}^3\) whose degeneracy
  divisor is a configuration of three planes and a cubic. The variables
  \(x_1, x_2, x_3\) commute among themselves, while the fourth variable \(x_4\)
  acts on them through a derivation built from the cyclic data \((c_i, d_i)\).
  The point scheme is a union of three lines and a rational normal quartic.
relations:
  - "x_4 x_1 - x_1 x_4 - x_1^2 - x_1 ((-c_3 - 2) x_2 + c_1 x_3) - d_1 x_2 x_3"
  - "x_4 x_2 - x_2 x_4 - x_2^2 - x_2 ((-c_1 - 2) x_3 + c_2 x_1) - d_2 x_3 x_1"
  - "x_4 x_3 - x_3 x_4 - x_3^2 - x_3 ((-c_2 - 2) x_1 + c_3 x_2) - d_3 x_1 x_2"
  - "x_2 x_3 - x_3 x_2"
  - "x_3 x_1 - x_1 x_3"
  - "x_1 x_2 - x_2 x_1"
references:
  - "MR3366864"
point_scheme: 'three lines and a rational normal quartic'

