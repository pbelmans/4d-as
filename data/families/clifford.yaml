parameters:
  - symbol: "a_{ijℓ}"
    description: >
      For each pair \(i < j\), the four coefficients of \(x_1^2, x_2^2, x_3^2,
      x_4^2\) in the corresponding relation — equivalently four symmetric
      matrices of quadrics (24 scalars).
introduced:
  reference: "MR1356364"
  note: >
    A graded Clifford algebra; the graded skew generalisation is due to
    Cassidy–Vancliff.
construction: >
  Each pair of generators anticommutes up to a quadratic correction that is a
  linear combination of the squares \(x_ℓ^2\). Equivalently the algebra is
  determined by a symmetric \(4 \times 4\) matrix of quadratic forms; it is
  Artin–Schelter regular exactly when the associated system of quadrics is
  base-point free. The four squares span a \(4\)-dimensional space of central
  quadrics.
relations:
  - "x_1 x_2 + x_2 x_1 + a_{121} x_1^2 + a_{122} x_2^2 + a_{123} x_3^2 + a_{124} x_4^2"
  - "x_1 x_3 + x_3 x_1 + a_{131} x_1^2 + a_{132} x_2^2 + a_{133} x_3^2 + a_{134} x_4^2"
  - "x_1 x_4 + x_4 x_1 + a_{141} x_1^2 + a_{142} x_2^2 + a_{143} x_3^2 + a_{144} x_4^2"
  - "x_2 x_3 + x_3 x_2 + a_{231} x_1^2 + a_{232} x_2^2 + a_{233} x_3^2 + a_{234} x_4^2"
  - "x_2 x_4 + x_4 x_2 + a_{241} x_1^2 + a_{242} x_2^2 + a_{243} x_3^2 + a_{244} x_4^2"
  - "x_3 x_4 + x_4 x_3 + a_{341} x_1^2 + a_{342} x_2^2 + a_{343} x_3^2 + a_{344} x_4^2"
references:
  - "MR1356364"
  - "MR2580455"
point_scheme: '20 points'
centre: '\(\dim \operatorname{Z}(A)_2 = 4\) (the four squares are central)'

