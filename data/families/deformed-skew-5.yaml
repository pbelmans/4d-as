name: 'deformed skew \((x_2x_1, x_3x_2;\ x_3^2, x_4^2)\)'
kind: "named"
generators: ["x_1", "x_2", "x_3", "x_4"]
quadratic: true
num_parameters: 4
hh0: [2, 2, 2]
year: "?"
slug: "deformed-skew-5"
sortkey: "9999 deformed-skew-5"
parameters:
  - symbol: "q_{12}, q_{24}"
    description: "skew-commutation parameters."
  - symbol: "t, s"
    description: "coefficients of the two deforming terms."
introduced:
  reference: "2511.08390"
  note: >
    One of the deformed skew polynomial (\(\mathcal{F}\)) families of
    arXiv:2511.08390; its earlier origin is not pinned down here.
construction: >
  A quantum (skew) polynomial ring deformed in two relations: the \(x_2 x_1\)
  relation acquires \(-t\,x_3^2\) and the \(x_3 x_2\) relation \(-s\,x_4^2\).
relations:
  - "x_2 x_1 - q_{12} x_1 x_2 - t x_3^2"
  - "x_3 x_1 - (1/(q_{24}^6 q_{12})) x_1 x_3"
  - "x_4 x_1 - (1/q_{24}^3) x_1 x_4"
  - "x_3 x_2 - (q_{24}^6 q_{12}) x_2 x_3 - s x_4^2"
  - "x_4 x_2 - q_{24} x_2 x_4"
  - "x_4 x_3 - (1/q_{24}) x_3 x_4"
references:
  - "2511.08390"
