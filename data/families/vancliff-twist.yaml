name: "Vancliff twist"
kind: "named"
generators: ["x_1", "x_2", "x_3", "x_4"]
quadratic: true
num_parameters: 3
hh0: [3, 4, 3]
hh_qgr: [1, 2, 4, 7]
point_scheme_dim: 1
year: 1994
slug: "vancliff-twist"
sortkey: "1994 vancliff-twist"
ks_rank: 3
ks_inj: true
ks_surj: false
parameters:
  - symbol: "α, β, λ"
    description: 'Scalars with \(λ \neq αβ\).'
introduced:
  reference: "MR1272579"
  note: >
    A twist of Vancliff's quadric-and-line algebra, appearing among the
    components classified in arXiv:2511.08390.
construction: >
  Obtained from the Vancliff algebra by changing the sign in the relations
  involving \(x_4\) (so two \(q\)-commutators become \(q\)-anticommutators). The
  point scheme degenerates to a configuration of five lines.
relations:
  - "x_2 x_1 - α x_1 x_2"
  - "x_3 x_1 - λ x_1 x_3"
  - "x_4 x_1 - α λ x_1 x_4"
  - "x_4 x_3 + α x_3 x_4"
  - "x_4 x_2 + λ x_2 x_4"
  - "x_3 x_2 + β x_2 x_3 - (α β - λ) x_1 x_4"
references:
  - "MR1272579"
  - "2511.08390"
point_scheme: 'five lines (\(K_4\) minus one edge)'
