introduced:
  reference: "MR2580455"
  note: >
    An example of a graded skew Clifford algebra of Cassidy–Vancliff.
construction: >
  A graded skew Clifford algebra: the symmetric Clifford relations are twisted
  by roots of unity, so \(x_4, x_1\) and \(x_3, x_2\) skew-commute while the
  remaining relations carry quadratic corrections. Such algebras are regular
  when the defining quadrics are normalizing and base-point free.
relations:
  - "x_4 x_1 - α x_1 x_4"
  - "x_3 x_2 - β x_2 x_3"
  - "x_3^2 - x_1^2"
  - "x_4^2 - x_2^2"
  - "x_3 x_1 - x_1 x_3 + x_2^2"
  - "x_4 x_2 - x_2 x_4 + γ^2 x_1^2"
references:
  - "MR2580455"
  - "2511.08390"
