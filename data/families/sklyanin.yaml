name: "Sklyanin"
kind: "named"
generators: ["x_1", "x_2", "x_3", "x_4"]
quadratic: true
num_parameters: 2
hh0: [1, 2, 9]
hh_qgr: [1, 0, 2, 7]
point_scheme_dim: 1
year: 1982
slug: "sklyanin"
sortkey: "1982 sklyanin"
parameters:
  - symbol: "β, γ"
    description: >
      Two scalar parameters; the third is \(α = -(β + γ)/(1 + βγ)\), so that
      \(α + β + γ + αβγ = 0\). Generic \((β, γ)\) with \(α, β, γ \notin \{0, \pm 1\}\).
introduced:
  reference: "MR684124"
  note: >
    The 4-dimensional Sklyanin algebra, introduced by Sklyanin (1982/1983) in
    connection with the quantum Yang–Baxter equation and elliptic \(R\)-matrices.
    Its Artin–Schelter regularity was established by Smith–Stafford.
construction: >
  The "elliptic" noncommutative \(\mathbb{P}^3\). The algebra is built from an
  elliptic curve \(E\) together with a translation automorphism \(σ\): the six
  quadratic relations encode theta-function identities on \(E\), and the point
  scheme is \(E\) itself (a quartic) together with four \(σ\)-fixed points. It
  carries a pencil of central quadrics \(k[Ω_1, Ω_2]\).
relations:
  - "(x_1 x_2 - x_2 x_1) - α (x_3 x_4 + x_4 x_3)"
  - "(x_1 x_2 + x_2 x_1) - (x_3 x_4 - x_4 x_3)"
  - "(x_1 x_3 - x_3 x_1) - β (x_4 x_2 + x_2 x_4)"
  - "(x_1 x_3 + x_3 x_1) - (x_4 x_2 - x_2 x_4)"
  - "(x_1 x_4 - x_4 x_1) - γ (x_2 x_3 + x_3 x_2)"
  - "(x_1 x_4 + x_4 x_1) - (x_2 x_3 - x_3 x_2)"
references:
  - "MR684124"
  - "MR1175941"
  - "2511.08390"
point_scheme: 'a quartic elliptic curve \(E\) and four points'
centre: '\(k[Ω_1, Ω_2]\) (GK-dimension \(2\)); not module-finite over the centre when \(σ\) has infinite order'
