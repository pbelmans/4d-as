introduced:
  reference: "MR3527537"
  note: >
    The generic quantum (skew) polynomial ring; its point variety was determined
    by Belmans–De Laet–Le Bruyn. It also occurs as the four-generator graded
    skew Clifford algebra.
construction: >
  The skew polynomial ring: each pair of generators \(q\)-commutes,
  \(x_i x_j = q_{ij}\, x_j x_i\). This is the most "abelian" noncommutative
  \(\mathbb{P}^3\), a toric deformation of the polynomial ring. Its point scheme
  is the \(1\)-skeleton of the coordinate tetrahedron — the six edges (a copy of
  \(K_4\)), two edges meeting iff they share a vertex.
relations:
  - "x_1 x_2 - q_{12} x_2 x_1"
  - "x_1 x_3 - q_{13} x_3 x_1"
  - "x_1 x_4 - q_{14} x_4 x_1"
  - "x_2 x_3 - q_{23} x_3 x_2"
  - "x_2 x_4 - q_{24} x_4 x_2"
  - "x_3 x_4 - q_{34} x_4 x_3"
references:
  - "MR3527537"
  - "MR1086882"
point_scheme: 'six lines, the tetrahedron skeleton \(K_4\)'
centre: 'trivial in low degrees'

