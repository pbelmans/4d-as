name: "G"
kind: "iterated-Ore"
generators: ["x_1", "x_2", "x_3", "x_4"]
quadratic: true
num_parameters: 3
hh0: [2, 2, 2]
hh_qgr: [1, 1, 8, 12]
point_scheme_dim: 1
parameters:
  - symbol: "p"
    description: "scalar parameter"
  - symbol: "f"
    description: "scalar parameter"
  - symbol: "h"
    description: "deformation parameter (generic scalar)"
introduced:
  reference: "2511.08390"
  note: "Family G in the classification of Koszul AS-regular algebras of dimension 4 (arXiv:2511.08390)."
construction: >
  An iterated Ore extension giving a quadratic Koszul AS-regular algebra of
  global dimension 4 (a noncommutative \(\mathbb{P}^3\)). Family G is one of
  the components A–Z of the classification.
relations:
  - "x_2 x_1 - x_1 x_2"
  - "x_4 x_3 - p x_3 x_4"
  - "x_3 x_1 + h (- p x_1 x_3)"
  - "x_3 x_2 + h (- p x_1 x_3 - p^2 x_2 x_3 - x_1 x_4)"
  - "x_4 x_1 + h (- p x_1 x_4)"
  - "x_4 x_2 + h (- f x_1 x_3 + x_1 x_4 - x_2 x_4)"
notes: ""
