  note: >
    The algebra "T" of Goetz–Kirkman–Moore–Vashaw, one of three dimension-four
    Artin–Schelter regular algebras they construct from a dual reflection group
    of order 16. It is a rigid (parameter-free) example, differing from their
    algebra "S" in two signs but sharing its graded Hochschild cohomology.
construction: >
  A quadratic algebra with no scalar parameters coming from a dual reflection
  group, a sign variant of the algebra "S" above. The Kodaira–Spencer map vanishes, so the
  family is a rigid point of the moduli space.
