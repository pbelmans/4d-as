  - "x_1 x_3 - x_2 x_4"
  - "x_1 x_4 - x_4 x_2"
  - "x_2 x_3 - x_3 x_1"
  - "x_3 x_2 - x_4 x_1"
  - "x_2 x_1 - x_4 x_4"
