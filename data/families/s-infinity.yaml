name: '\(S_\infty\)'
kind: "named"
generators: ["x_1", "x_2", "x_3", "x_4"]
quadratic: true
num_parameters: 2
hh0: [1, 2, 5]
hh_qgr: [1, 0, 2, 7]
point_scheme_dim: 1
year: 2016
slug: "s-infinity"
sortkey: "2016 s-infinity"
parameters:
  - symbol: "β, γ"
    description: >
      With \(α = -(β + γ)/(1 + βγ)\); \(α, β, γ\) nonzero and not \(\pm 1\).
introduced:
  reference: "MR3490085"
  note: >
    One of the degenerate "limit" algebras \(S_\infty\) arising in Davies' study
    of cocycle twists of the 4-dimensional Sklyanin algebra; an exotic elliptic
    algebra in the sense of Chirvasitu–Smith.
construction: >
  \(S_\infty\) keeps the first four (commutator/anticommutator) Sklyanin
  relations but replaces the last two by the quadrics
  \(Ω_1 = -x_1^2 + x_2^2 + x_3^2 + x_4^2\) and
  \(Ω_2 = x_2^2 + \tfrac{1+α}{1-β} x_3^2 + \tfrac{1-α}{1+γ} x_4^2\), imposed as
  relations. This kills the central quadrics yet keeps the elliptic quartic as
  point scheme.
relations:
  - "(x_1 x_2 - x_2 x_1) - α (x_3 x_4 + x_4 x_3)"
  - "(x_1 x_2 + x_2 x_1) - (x_3 x_4 - x_4 x_3)"
  - "(x_1 x_3 - x_3 x_1) - β (x_4 x_2 + x_2 x_4)"
  - "(x_1 x_3 + x_3 x_1) - (x_4 x_2 - x_2 x_4)"
  - "-x_1^2 + x_2^2 + x_3^2 + x_4^2"
  - "x_2^2 + ((1+α)/(1-β)) x_3^2 + ((1-α)/(1+γ)) x_4^2"
references:
  - "MR3490085"
  - "MR3885145"
  - "2511.08390"
notes: >
  Point scheme: a quartic elliptic curve \(E\) and four points (the same curve
  as Sklyanin), although \(\dim Z_2 = 0\) (the two quadrics are now relations,
  not central).
