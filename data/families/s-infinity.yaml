parameters:
  - symbol: "β, γ"
    description: >
      With \(α = -(β + γ)/(1 + βγ)\); \(α, β, γ\) nonzero and not \(\pm 1\).
introduced:
  reference: "MR3490085"
  note: >
    One of the algebras \(\mathrm{S}_\infty\) arising in Davies' study of cocycle
    twists of the 4-dimensional Sklyanin algebra; an exotic elliptic algebra in
    the sense of Chirvasitu–Smith. The subscript \(\infty\) marks it as the
    degenerate limit of Davies' one-parameter family \(\mathrm{S}_d\) of twisted
    Sklyanin algebras (the \(d \to \infty\) member), where the two central
    quadrics of the Sklyanin algebra are instead imposed as defining relations.
construction: >
  \(\mathrm{S}_\infty\) keeps the first four (commutator/anticommutator) Sklyanin
  relations but replaces the last two by the quadrics
  \(\Omega_1 = -x_1^2 + x_2^2 + x_3^2 + x_4^2\) and
  \(\Omega_2 = x_2^2 + \tfrac{1+α}{1-β} x_3^2 + \tfrac{1-α}{1+γ} x_4^2\), imposed as
  relations. This kills the central quadrics yet keeps the elliptic quartic as
  point scheme.
relations:
  - "(x_1 x_2 - x_2 x_1) - α (x_3 x_4 + x_4 x_3)"
  - "(x_1 x_2 + x_2 x_1) - (x_3 x_4 - x_4 x_3)"
  - "(x_1 x_3 - x_3 x_1) - β (x_4 x_2 + x_2 x_4)"
  - "(x_1 x_3 + x_3 x_1) - (x_4 x_2 - x_2 x_4)"
  - "-x_1^2 + x_2^2 + x_3^2 + x_4^2"
  - "x_2^2 + ((1+α)/(1-β)) x_3^2 + ((1-α)/(1+γ)) x_4^2"
references:
  - "MR3490085"
  - "MR3885145"
point_scheme: 'a quartic elliptic curve \(E\) and four points (the same curve as Sklyanin)'
centre: '\(\dim \operatorname{Z}(A)_2 = 0\): the two quadrics are imposed as relations, not central'
code_derive:
  - "alpha = -(beta + gamma)/(1 + beta*gamma)"
